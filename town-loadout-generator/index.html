<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadout Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }
        .ghost-card { opacity: 0.15; border: 1px dashed #ffffff !important; }
        .click-bounce:active { transform: scale(0.97); }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #000000;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #222222;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ffffff;
        }
    </style>
</head>
<body class="bg-[#000000] text-[#ffffff] min-h-screen p-4 md:p-8 flex flex-col justify-between selection:bg-[#ffffff] selection:text-[#000000]">

    <div id="app" class="max-w-xl w-full mx-auto flex flex-col h-[calc(100vh-6rem)]">
        
        <header class="mb-4 flex justify-between items-center gap-4 border-b border-[#222222] pb-4 shrink-0">
            <div class="bg-[#000000] p-1 border border-[#222222] flex gap-1 rounded-none">
                <button @click="setMode('sts')" :class="['px-4 py-1 text-xs font-bold transition-all click-bounce rounded-none', mode === 'sts' ? 'bg-[#ffffff] text-[#000000]' : 'text-[#888888] hover:text-[#ffffff]']">
                    !sts
                </button>
                <button @click="setMode('s')" :class="['px-4 py-1 text-xs font-bold transition-all click-bounce rounded-none', mode === 's' ? 'bg-[#ffffff] text-[#000000]' : 'text-[#888888] hover:text-[#ffffff]']">
                    !s
                </button>
            </div>

            <div class="flex gap-1">
                <input 
                    type="text" 
                    v-model="importString" 
                    placeholder="Paste command..." 
                    class="bg-[#000000] border border-[#222222] focus:border-[#ffffff] text-xs text-[#ffffff] px-2.5 py-1.5 focus:outline-none placeholder-[#555555] font-mono rounded-none"
                    @keydown.enter="decompileCommand"
                />
                <button @click="decompileCommand" class="bg-[#111111] hover:bg-[#ffffff] hover:text-[#000000] text-[#ffffff] border border-[#222222] font-bold text-xs px-3 transition-all click-bounce rounded-none">
                    PARSE
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto pr-1 custom-scrollbar mb-4">
            <main class="space-y-4" @dragover.prevent @drop="onDrop">
                
                <div 
                    v-for="(item, index) in loadout" 
                    :key="item.id"
                    :class="['group transition-all border border-[#111111] bg-[#050505] p-3 rounded-none relative', draggedIndex === index ? 'ghost-card' : '']"
                    @dragover.prevent="onDragOver(index)"
                >
                    <div class="flex items-center gap-2 py-1">
                        
                        <div 
                            draggable="true"
                            @dragstart="onDragStart(index, $event)"
                            @dragend="onDragEnd"
                            class="text-[#555555] hover:text-[#ffffff] cursor-grab active:cursor-grabbing select-none text-xs font-bold px-1.5 py-0.5 border border-[#222222] bg-[#000000] rounded-none"
                            title="Drag Item"
                        >
                            ::
                        </div>

                        <button 
                            v-if="item.attachments.length > 0 && !item.isArmor"
                            @click="item.expanded = !item.expanded"
                            class="text-xs text-[#555555] hover:text-[#ffffff] font-bold w-4 h-4 flex items-center justify-center bg-[#000000] border border-[#222222] rounded-none"
                        >
                            {{ item.expanded ? '−' : '+' }}
                        </button>
                        <div v-else class="w-4"></div>

                        <div class="relative w-40">
                            <input 
                                type="text" 
                                v-model="item.weapon"
                                @focus="setFocusedField(index, 'weapon', null)"
                                @blur="clearFocusedField"
                                :placeholder="item.isArmor ? 'ARMOR NAME' : 'WEAPON NAME'" 
                                :class="['bg-[#000000] border focus:outline-none px-3 py-1.5 text-xs font-bold w-full tracking-wide font-mono rounded-none', 
                                    item.isArmor ? 'border-[#888888] text-[#888888] focus:border-[#ffffff]' : 'border-[#222222] focus:border-[#ffffff] text-white'
                                ]"
                                @keydown.enter="addItem"
                            />
                            <div v-if="!item.isArmor && isInvalidWeapon(item.weapon)" class="absolute right-2.5 top-2 group/tooltip cursor-help">
                                <span class="text-red-500 font-bold text-xs">!</span>
                                <div class="hidden group-hover/tooltip:block absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#111111] border border-[#ffffff] text-white text-[10px] p-2 whitespace-nowrap z-50">
                                    Weapon may not exist
                                </div>
                            </div>
                            
                            <div v-if="isFieldFocused(index, 'weapon', null) && getSuggestions(item.weapon, 'weapon').length > 0" class="absolute left-0 top-full w-full bg-[#050505] border border-[#ffffff] z-50 max-h-32 overflow-y-auto">
                                <div 
                                    v-for="sug in getSuggestions(item.weapon, 'weapon')" 
                                    :key="sug.name"
                                    @mousedown.prevent="selectSuggestion(index, 'weapon', null, sug.name)"
                                    :class="['px-2 py-1.5 text-[11px] font-mono hover:bg-[#ffffff] hover:text-[#000000] cursor-pointer flex justify-between items-center', sug.gamepass ? 'text-yellow-400' : 'text-white']"
                                >
                                    <span>{{ sug.name }}</span>
                                    <span v-if="sug.gamepass" class="text-[8px] border border-yellow-500 text-yellow-400 px-1 font-sans">GP</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 text-xs ml-auto">
                            <button v-if="!item.isArmor" @click="addAttachment(index)" class="text-[#888888] hover:text-[#ffffff] font-bold text-[10px] tracking-wider uppercase rounded-none">
                                +ATTACHMENT
                            </button>
                            <span v-else class="text-[#888888] font-bold text-[9px] tracking-wider uppercase border border-[#333333] px-2 py-0.5 bg-[#0a0a0a] rounded-none">ARMOR</span>
                            
                            <button @click="removeItem(index)" class="text-[#888888] hover:text-[#ff3333] font-bold text-[10px] tracking-wider uppercase rounded-none">
                                [REMOVE]
                            </button>
                        </div>
                    </div>

                    <div v-if="item.attachments.length > 0 && item.expanded && !item.isArmor" class="space-y-1 ml-6 mt-2 pt-2 border-t border-[#111111]">
                        <div v-for="(att, attIndex) in item.attachments" :key="attIndex" class="flex items-center gap-2 py-0.5 relative">
                            
                            <span class="text-[#333333] font-bold select-none text-xs pr-1">
                                {{ attIndex === item.attachments.length - 1 ? '└──' : '├──' }}
                            </span>

                            <div class="relative w-32">
                                <input 
                                    type="text" 
                                    v-model="item.attachments[attIndex]"
                                    @focus="setFocusedField(index, 'attachment', attIndex)"
                                    @blur="clearFocusedField"
                                    placeholder="ATTACH_NAME"
                                    :class="['bg-[#000000] border focus:outline-none px-2.5 py-1 text-[11px] focus:outline-none placeholder-[#555555] w-full font-mono rounded-none',
                                        'border-[#222222] focus:border-[#ffffff] text-[#cbd5e1]'
                                    ]"
                                    @keydown.enter="addAttachment(index)"
                                />
                                <div v-if="isInvalidAttachment(item.attachments[attIndex])" class="absolute right-2 top-1.5 group/tooltip cursor-help">
                                    <span class="text-red-500 font-bold text-[10px]">!</span>
                                    <div class="hidden group-hover/tooltip:block absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#111111] border border-[#ffffff] text-white text-[10px] p-2 whitespace-nowrap z-50">
                                        Attachment may not exist
                                    </div>
                                </div>

                                <div v-if="isFieldFocused(index, 'attachment', attIndex) && getSuggestions(item.attachments[attIndex], 'attachment').length > 0" class="absolute left-0 top-full w-full bg-[#050505] border border-[#ffffff] z-50 max-h-32 overflow-y-auto">
                                    <div 
                                        v-for="sug in getSuggestions(item.attachments[attIndex], 'attachment')" 
                                        :key="sug"
                                        @mousedown.prevent="selectSuggestion(index, 'attachment', attIndex, sug)"
                                        class="px-2 py-1 text-[10px] font-mono hover:bg-[#ffffff] hover:text-[#000000] cursor-pointer"
                                    >
                                        {{ sug }}
                                    </div>
                                </div>
                            </div>

                            <button 
                                @click="removeAttachment(index, attIndex)" 
                                class="w-4 h-4 flex items-center justify-center text-xs font-bold bg-[#000000] border border-[#333333] hover:border-[#ff3333] text-[#888888] hover:text-[#ff3333] transition-colors rounded-none"
                            >
                                ×
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-2 flex gap-2 items-center">
                    <button 
                        @click="addItem" 
                        class="text-[10px] text-[#888888] hover:text-[#ffffff] border border-dashed border-[#222222] hover:border-[#ffffff] px-3 py-1.5 bg-transparent font-bold tracking-widest transition-all click-bounce uppercase rounded-none"
                    >
                        + ADD ITEM
                    </button>
                    
                    <button 
                        v-if="mode === 's' && !hasArmor"
                        @click="addArmorItem" 
                        class="text-[10px] text-[#888888] hover:text-[#ffffff] border border-dashed border-[#222222] hover:border-[#ffffff] px-3 py-1.5 bg-transparent font-bold tracking-widest transition-all click-bounce uppercase rounded-none"
                    >
                        + ADD ARMOR
                    </button>
                </div>
                
                <div v-if="loadout.length === 0" class="text-left py-12 border border-dashed border-[#222222] text-[#555555] text-xs uppercase tracking-widest select-none pl-4 rounded-none">
                    LOADOUT EMPTY
                </div>
            </main>
        </div>

        <footer class="bg-[#000000] border-t border-[#222222] pt-4 pb-2 shrink-0">
            <div class="flex gap-3 items-center relative">
                
                <div class="flex-1 relative h-10 group">
                    <input 
                        type="text" 
                        readonly 
                        :value="compiledCommand"
                        class="w-full bg-[#050505] border border-[#222222] text-[#ffffff] text-xs focus:outline-none select-all font-bold h-full whitespace-nowrap overflow-hidden text-ellipsis font-mono px-3 rounded-none"
                    />
                    <div class="hidden group-hover:block absolute bottom-12 left-0 w-full bg-[#000000] border border-[#ffffff] text-[#ffffff] text-xs font-bold font-mono p-3 z-50 select-all break-all whitespace-pre-wrap max-h-32 overflow-y-auto rounded-none">
                        {{ compiledCommand }}
                    </div>
                </div>
                
                <button 
                    @click="copyToClipboard" 
                    :class="['px-6 h-10 font-bold text-xs transition-all click-bounce border shrink-0 rounded-none', copied ? 'bg-[#ffffff] border-[#ffffff] text-[#000000]' : 'bg-[#000000] border-[#222222] text-[#ffffff] hover:bg-[#111111] hover:border-[#ffffff]']"
                >
                    {{ copied ? 'COPIED' : 'COPY' }}
                </button>
            </div>
        </footer>

    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const mode = ref('sts');
                const copied = ref(false);
                const draggedIndex = ref(null);
                const importString = ref('');
                const loadout = ref([]); 
                const focusedField = ref({ index: null, type: null, attIndex: null });

                //list of weapons from the town wiki, may become outdated when new updates happen
                const wikiWeapons = [
                    { name: 'AK-47', gamepass: false },

                    { name: 'Olympia', gamepass: true },

                    { name: 'M870', gamepass: false },

                    { name: 'Walther WA2000', gamepass: true },
                    { name: 'Barrett M82A3', gamepass: true },
                    { name: 'GM6 Lynx', gamepass: true },
                    { name: 'HW Jolt', gamepass: false },
                    { name: 'Kriss Vector', gamepass: true },
                    { name: 'Kriss Vector Gen2', gamepass: true },
                    { name: 'M1921 Thompson', gamepass: true },
                    { name: 'draco', gamepass: false },
                    { name: 'MP40', gamepass: false },
                    { name: 'MP5A2', gamepass: false },
                    { name: 'MP7', gamepass: false },
                    { name: 'MPX', gamepass: false },
                    { name: 'PP2000', gamepass: true },
                    { name: 'P90', gamepass: false },
                    { name: 'Scorpion EVO', gamepass: true },
                    { name: 'SR-2', gamepass: false },
                    { name: 'SR-3 Vikhr', gamepass: false },
                    { name: 'UMP-45', gamepass: false },
                    { name: 'Uzi', gamepass: false },
                    { name: 'PPSH-41', gamepass: false },
                    { name: 'Honey Badger', gamepass: false },
                    { name: 'CQ300 Lynx', gamepass: true },
                    { name: 'AR-10', gamepass: false },
                    { name: 'AR-15', gamepass: false },
                    { name: 'HW Spear', gamepass: false },
                    { name: 'SKS', gamepass: false },
                    { name: 'Model 1777 Musket', gamepass: false },
                    { name: 'Bryson Repeater', gamepass: false },
                    { name: 'Saddlegun', gamepass: false }
                ];

                const wikiAttachments = [
                    'ACOG Sight', 'AEMS Sight', 'CCO M68', 'CL6X Sight', 'Coyote Sight', 'EOTech Sight', 
                    'Holosun 507c', 'Hunting Scope', 'JGM4 Sight', 'Kobra Sight', 'M145 Sight', 'Professional Scope', 
                    'PSO-1 Scope', 'Reflex Sight', 'SRS Sight', 'Scrap Sight', 'Angled Grip', 'Bipod', 
                    'DD Grip', 'Ergo Grip', 'Folding Grip', 'Hera CQR Front Grip', 'MOE Grip', 'Offset RK-2 Foregrip', 
                    'RK-6 Short Grip', 'RSB Grip', 'SE Elite Grip', 'Skeleton Grip', 'Strike Grip', 'Compensator', 
                    'Flash Hider', 'Heavy Suppressor', 'Muzzle Brake', 'Oil Filter', 'Osprey Suppressor', 
                    'SLR Compensator', 'Short Suppressor', 'Suppressor', 'TAA Muzzle Brake', 'Wide Choke', 
                    'MK23 Suppressor', 'PBS Suppressor', 'Lasers (Red, Blue, Green)', 'Flashlight', 'NGAL', 
                    'Rangefinder', 'Red Laser', 'Blue Laser', 'Green Laser', 'TLR-7', 'Laser MK23', 'Inforce Light', 
                    'Extended Stock'
                ];

                const wikiArmors = ['heavyarmor', 'lightarmor', 'armor', 'mediumarmor'];

                const hasArmor = computed(() => {
                    return loadout.value.some(item => item.isArmor);
                });

                const addItem = () => {
                    loadout.value.push({ id: Date.now(), weapon: '', attachments: [], expanded: true, isArmor: false });
                };

                const addArmorItem = () => {
                    if (mode.value === 's' && !hasArmor.value) {
                        loadout.value.push({ id: Date.now(), weapon: '', attachments: [], expanded: false, isArmor: true });
                    }
                };

                const removeItem = (index) => {
                    loadout.value.splice(index, 1);
                };

                const addAttachment = (itemIndex) => {
                    if (loadout.value[itemIndex].isArmor) return;
                    loadout.value[itemIndex].attachments.push('');
                    loadout.value[itemIndex].expanded = true;
                };

                const removeAttachment = (itemIndex, attIndex) => {
                    loadout.value[itemIndex].attachments.splice(attIndex, 1);
                };

                const setMode = (targetMode) => {
                    mode.value = targetMode;
                    if (targetMode === 'sts') {
                        loadout.value = loadout.value.filter(item => !item.isArmor);
                    }
                };

                const cleanInput = (str) => {
                    return str.replace(/\s+/g, '').toLowerCase();
                };

                const looseClean = (str) => {
                    return str.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                };

                const isInvalidWeapon = (name) => {
                    if (!name.trim()) return false;
                    const clean = looseClean(name);
                    return !wikiWeapons.some(w => {
                        const cleanW = looseClean(w.name);
                        return cleanW.includes(clean);
                    });
                };

                const isInvalidAttachment = (name) => {
                    if (!name.trim()) return false;
                    const clean = looseClean(name);
                    return !wikiAttachments.some(a => {
                        const cleanA = looseClean(a);
                        return cleanA.includes(clean);
                    });
                };

                const setFocusedField = (index, type, attIndex) => {
                    focusedField.value = { index, type, attIndex };
                };

                const clearFocusedField = () => {
                    setTimeout(() => {
                        focusedField.value = { index: null, type: null, attIndex: null };
                    }, 200);
                };

                const isFieldFocused = (index, type, attIndex) => {
                    return focusedField.value.index === index && 
                           focusedField.value.type === type && 
                           focusedField.value.attIndex === attIndex;
                };

                const getSuggestions = (query, type) => {
                    if (!query.trim()) return [];
                    const cleanQuery = looseClean(query);
                    if (type === 'weapon') {
                        return wikiWeapons.filter(item => {
                            const cleanItem = looseClean(item.name);
                            return cleanItem.includes(cleanQuery) && cleanItem !== cleanQuery;
                        }).slice(0, 5);
                    } else {
                        return wikiAttachments.filter(item => {
                            const cleanItem = looseClean(item);
                            return cleanItem.includes(cleanQuery) && cleanItem !== cleanQuery;
                        }).slice(0, 5);
                    }
                };

                const selectSuggestion = (index, type, attIndex, value) => {
                    if (type === 'weapon') {
                        loadout.value[index].weapon = value;
                    } else if (type === 'attachment') {
                        loadout.value[index].attachments[attIndex] = value;
                    }
                    focusedField.value = { index: null, type: null, attIndex: null };
                };

                const onDragStart = (index, event) => {
                    draggedIndex.value = index;
                    event.dataTransfer.effectAllowed = 'move';
                };

                const onDragOver = (index) => {
                    if (draggedIndex.value === null || draggedIndex.value === index) return;
                    const items = [...loadout.value];
                    const targetItem = items.splice(draggedIndex.value, 1)[0];
                    items.splice(index, 0, targetItem);
                    loadout.value = items;
                    draggedIndex.value = index;
                };

                const onDragEnd = () => { draggedIndex.value = null; };
                const onDrop = () => { draggedIndex.value = null; };

                const decompileCommand = () => {
                    let text = importString.value.trim();
                    if (!text) return;

                    let discoveredArmor = '';

                    if (text.includes('!sa')) {
                        const armorMatch = text.match(/!sa\s+([^\s|]+)/);
                        if (armorMatch) {
                            discoveredArmor = armorMatch[1];
                            text = text.replace(/!sa\s+[^\s|]+/, '');
                        }
                    }

                    if (text.startsWith('!sts')) {
                        mode.value = 'sts';
                        text = text.replace(/^!sts\s+/, '');
                    } else if (text.startsWith('!s')) {
                        mode.value = 's';
                        text = text.replace(/!s\s+/g, '').replace(/\s*\|\s*/g, ' ');
                    } else {
                        text = text.replace(/^!(setspawn|spawn)\s+/, '');
                    }

                    const newLoadout = [];
                    const tokens = text.split(/\s+/);

                    tokens.forEach((token, index) => {
                        if (!token) return;
                        const pieces = token.split('+');
                        const baseName = pieces[0];

                        const isArmorToken = baseName.toLowerCase().includes('armor') && mode.value === 's';

                        newLoadout.push({
                            id: Date.now() + index,
                            weapon: baseName,
                            attachments: isArmorToken ? [] : pieces.slice(1),
                            expanded: true,
                            isArmor: isArmorToken
                        });
                    });

                    if (discoveredArmor && mode.value === 's') {
                        newLoadout.push({
                            id: Date.now() + 99,
                            weapon: discoveredArmor,
                            attachments: [],
                            expanded: false,
                            isArmor: true
                        });
                    }

                    if (newLoadout.length > 0) {
                        let armorFound = false;
                        const filteredLoadout = newLoadout.filter(item => {
                            if (item.isArmor) {
                                if (armorFound) return false;
                                armorFound = true;
                            }
                            return true;
                        });

                        loadout.value = filteredLoadout;
                        importString.value = '';
                    }
                };

                const compiledCommand = computed(() => {
                    const weaponModules = loadout.value.filter(item => item.weapon.trim() !== '' && !item.isArmor);
                    const armorModule = loadout.value.find(item => item.weapon.trim() !== '' && item.isArmor);

                    if (weaponModules.length === 0 && !armorModule) {
                        return mode.value === 'sts' ? '!sts' : '!s';
                    }

                    if (mode.value === 'sts') {
                        const activeUnits = weaponModules.map(item => {
                            const weapon = cleanInput(item.weapon);
                            const cleanAtts = item.attachments.filter(a => a.trim() !== '').map(a => cleanInput(a));
                            return cleanAtts.length > 0 ? `${weapon}+${cleanAtts.join('+')}` : weapon;
                        });
                        return `!sts ${activeUnits.join(' ')}`;
                    } else {
                        const activeSpawns = weaponModules.map(item => {
                            const weapon = cleanInput(item.weapon);
                            const cleanAtts = item.attachments.filter(a => a.trim() !== '').map(a => cleanInput(a));
                            return cleanAtts.length > 0 ? `!s ${weapon}+${cleanAtts.join('+')}` : `!s ${weapon}`;
                        });

                        if (armorModule) {
                            activeSpawns.push(`!sa ${cleanInput(armorModule.weapon)}`);
                        }

                        return activeSpawns.join(' | ');
                    }
                });

                const copyToClipboard = async () => {
                    try {
                        await navigator.clipboard.writeText(compiledCommand.value);
                        copied.value = true;
                        setTimeout(() => copied.value = false, 1200);
                    } catch (err) {
                        console.error(err);
                    }
                };

                return {
                    mode,
                    loadout,
                    copied,
                    draggedIndex,
                    importString,
                    hasArmor,
                    addItem,
                    addArmorItem,
                    removeItem,
                    addAttachment,
                    removeAttachment,
                    setMode,
                    isInvalidWeapon,
                    isInvalidAttachment,
                    setFocusedField,
                    clearFocusedField,
                    isFieldFocused,
                    getSuggestions,
                    selectSuggestion,
                    onDragStart,
                    onDragOver,
                    onDragEnd,
                    onDrop,
                    decompileCommand,
                    compiledCommand,
                    copyToClipboard
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
