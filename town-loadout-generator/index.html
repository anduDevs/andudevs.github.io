<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadout Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }
        .ghost-card { opacity: 0.15; border: 1px dashed #ffffff !important; }
        .click-bounce:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-[#000000] text-[#ffffff] min-h-screen p-4 md:p-8 pb-32">

    <div id="app" class="max-w-xl mx-auto">
        
        <header class="mb-8 flex justify-between items-center gap-4 border-b border-[#222222] pb-6">
            <div class="bg-[#000000] p-1 border border-[#222222] flex gap-1">
                <button @click="setMode('sts')" :class="['px-4 py-1 text-xs font-bold transition-all click-bounce', mode === 'sts' ? 'bg-[#ffffff] text-[#000000]' : 'text-[#888888] hover:text-[#ffffff]']">
                    !sts
                </button>
                <button @click="setMode('s')" :class="['px-4 py-1 text-xs font-bold transition-all click-bounce', mode === 's' ? 'bg-[#ffffff] text-[#000000]' : 'text-[#888888] hover:text-[#ffffff]']">
                    !s
                </button>
            </div>

            <div class="flex gap-1">
                <input 
                    type="text" 
                    v-model="importString" 
                    placeholder="Paste command..." 
                    class="bg-[#000000] border border-[#222222] focus:border-[#ffffff] text-xs text-[#ffffff] px-2.5 py-1.5 focus:outline-none placeholder-[#555555] font-mono"
                    @keydown.enter="decompileCommand"
                />
                <button @click="decompileCommand" class="bg-[#111111] hover:bg-[#ffffff] hover:text-[#000000] text-[#ffffff] border border-[#222222] font-bold text-xs px-3 transition-all click-bounce">
                    PARSE
                </button>
            </div>
        </header>

        <main class="space-y-4" @dragover.prevent @drop="onDrop">
            
            <div 
                v-for="(item, index) in loadout" 
                :key="item.id"
                :class="['group transition-all border border-[#111111] bg-[#050505] p-3', draggedIndex === index ? 'ghost-card' : '']"
                @dragover.prevent="onDragOver(index)"
            >
                <div class="flex items-center gap-2 py-1">
                    
                    <div 
                        draggable="true"
                        @dragstart="onDragStart(index, $event)"
                        @dragend="onDragEnd"
                        class="text-[#555555] hover:text-[#ffffff] cursor-grab active:cursor-grabbing select-none text-xs font-bold px-1.5 py-0.5 border border-[#222222] bg-[#000000]"
                        title="Drag Item"
                    >
                        ::
                    </div>

                    <button 
                        v-if="item.attachments.length > 0 && !item.isArmor"
                        @click="item.expanded = !item.expanded"
                        class="text-xs text-[#555555] hover:text-[#ffffff] font-bold w-4 h-4 flex items-center justify-center bg-[#000000] border border-[#222222]"
                    >
                        {{ item.expanded ? '−' : '+' }}
                    </button>
                    <div v-else class="w-4"></div>

                    <input 
                        type="text" 
                        v-model="item.weapon"
                        :placeholder="item.isArmor ? 'ARMOR_ID' : 'WEAPON_ID'" 
                        :class="['bg-[#000000] border focus:outline-none px-3 py-1.5 text-xs font-bold w-40 tracking-wide font-mono', item.isArmor ? 'border-[#888888] text-[#888888] focus:border-[#ffffff]' : 'border-[#222222] focus:border-[#ffffff] text-white']"
                        @keydown.enter="addItem"
                    />

                    <div class="flex items-center gap-3 text-xs ml-auto">
                        <button v-if="!item.isArmor" @click="addAttachment(index)" class="text-[#888888] hover:text-[#ffffff] font-bold text-[10px] tracking-wider uppercase">
                            +ATTACH
                        </button>
                        <span v-else class="text-[#888888] font-bold text-[9px] tracking-wider uppercase border border-[#333333] px-2 py-0.5 bg-[#0a0a0a]">ARMOR</span>
                        
                        <button @click="removeItem(index)" class="text-[#888888] hover:text-[#ff3333] font-bold text-[10px] tracking-wider uppercase">
                            [REMOVE]
                        </button>
                    </div>
                </div>

                <div v-if="item.attachments.length > 0 && item.expanded && !item.isArmor" class="space-y-1 ml-6 mt-2 pt-2 border-t border-[#111111]">
                    <div v-for="(att, attIndex) in item.attachments" :key="attIndex" class="flex items-center gap-2 py-0.5">
                        
                        <span class="text-[#333333] font-bold select-none text-xs pr-1">
                            {{ attIndex === item.attachments.length - 1 ? '└──' : '├──' }}
                        </span>

                        <input 
                            type="text" 
                            v-model="item.attachments[attIndex]"
                            placeholder="ATTACH_ID"
                            class="bg-[#000000] border border-[#222222] focus:border-[#ffffff] px-2.5 py-1 text-[11px] text-[#cbd5e1] focus:outline-none placeholder-[#555555] w-32 font-mono"
                            @keydown.enter="addAttachment(index)"
                        />

                        <button 
                            @click="removeAttachment(index, attIndex)" 
                            class="w-4 h-4 flex items-center justify-center text-xs font-bold bg-[#000000] border border-[#333333] hover:border-[#ff3333] text-[#888888] hover:text-[#ff3333] transition-colors"
                        >
                            ×
                        </button>
                    </div>
                </div>
            </div>

            <div class="pt-2 flex gap-2 items-center">
                <button 
                    @click="addItem" 
                    class="text-[10px] text-[#888888] hover:text-[#ffffff] border border-dashed border-[#222222] hover:border-[#ffffff] px-3 py-1.5 bg-transparent font-bold tracking-widest transition-all click-bounce uppercase"
                >
                    + ADD ITEM
                </button>
                
                <button 
                    v-if="mode === 's' && !hasArmor"
                    @click="addArmorItem" 
                    class="text-[10px] text-[#888888] hover:text-[#ffffff] border border-dashed border-[#222222] hover:border-[#ffffff] px-3 py-1.5 bg-transparent font-bold tracking-widest transition-all click-bounce uppercase"
                >
                    + ADD ARMOR
                </button>
            </div>
            
            <div v-if="loadout.length === 0" class="text-left py-12 border border-dashed border-[#222222] text-[#555555] text-xs uppercase tracking-widest select-none pl-4">
                [LOADOUT_EMPTY]
            </div>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-[#000000] border-t border-[#222222] p-4 z-50">
            <div class="max-w-xl mx-auto flex gap-3 items-center relative">
                
                <div class="flex-1 relative h-10 group">
                    <input 
                        type="text" 
                        readonly 
                        :value="compiledCommand"
                        class="w-full bg-[#050505] border border-[#222222] text-[#ffffff] text-xs focus:outline-none select-all font-bold h-full whitespace-nowrap overflow-hidden text-ellipsis font-mono px-3"
                    />
                    <div class="hidden group-hover:block absolute bottom-0 left-0 w-full bg-[#000000] border border-[#ffffff] text-[#ffffff] text-xs font-bold font-mono p-3 z-50 select-all break-all whitespace-pre-wrap max-h-32 overflow-y-auto">
                        {{ compiledCommand }}
                    </div>
                </div>
                
                <button 
                    @click="copyToClipboard" 
                    :class="['px-6 h-10 font-bold text-xs transition-all click-bounce border shrink-0', copied ? 'bg-[#ffffff] border-[#ffffff] text-[#000000]' : 'bg-[#000000] border-[#222222] text-[#ffffff] hover:bg-[#111111] hover:border-[#ffffff]']"
                >
                    {{ copied ? 'COPIED' : 'COPY' }}
                </button>
            </div>
        </footer>

    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const mode = ref('sts');
                const copied = ref(false);
                const draggedIndex = ref(null);
                const importString = ref('');
                const loadout = ref([]); 

                const hasArmor = computed(() => {
                    return loadout.value.some(item => item.isArmor);
                });

                const addItem = () => {
                    loadout.value.push({ id: Date.now(), weapon: '', attachments: [], expanded: true, isArmor: false });
                };

                const addArmorItem = () => {
                    if (mode.value === 's' && !hasArmor.value) {
                        loadout.value.push({ id: Date.now(), weapon: '', attachments: [], expanded: false, isArmor: true });
                    }
                };

                const removeItem = (index) => {
                    loadout.value.splice(index, 1);
                };

                const addAttachment = (itemIndex) => {
                    if (loadout.value[itemIndex].isArmor) return;
                    loadout.value[itemIndex].attachments.push('');
                    loadout.value[itemIndex].expanded = true;
                };

                const removeAttachment = (itemIndex, attIndex) => {
                    loadout.value[itemIndex].attachments.splice(attIndex, 1);
                };

                const setMode = (targetMode) => {
                    mode.value = targetMode;
                    if (targetMode === 'sts') {
                        loadout.value = loadout.value.filter(item => !item.isArmor);
                    }
                };

                const cleanInput = (str) => {
                    return str.replace(/\s+/g, '').toLowerCase();
                };

                const onDragStart = (index, event) => {
                    draggedIndex.value = index;
                    event.dataTransfer.effectAllowed = 'move';
                };

                const onDragOver = (index) => {
                    if (draggedIndex.value === null || draggedIndex.value === index) return;
                    const items = [...loadout.value];
                    const targetItem = items.splice(draggedIndex.value, 1)[0];
                    items.splice(index, 0, targetItem);
                    loadout.value = items;
                    draggedIndex.value = index;
                };

                const onDragEnd = () => { draggedIndex.value = null; };
                const onDrop = () => { draggedIndex.value = null; };

                const decompileCommand = () => {
                    let text = importString.value.trim();
                    if (!text) return;

                    let discoveredArmor = '';

                    if (text.includes('!sa')) {
                        const armorMatch = text.match(/!sa\s+([^\s|]+)/);
                        if (armorMatch) {
                            discoveredArmor = armorMatch[1];
                            text = text.replace(/!sa\s+[^\s|]+/, '');
                        }
                    }

                    if (text.startsWith('!sts')) {
                        mode.value = 'sts';
                        text = text.replace(/^!sts\s+/, '');
                    } else if (text.startsWith('!s')) {
                        mode.value = 's';
                        text = text.replace(/!s\s+/g, '').replace(/\s*\|\s*/g, ' ');
                    } else {
                        text = text.replace(/^!(setspawn|spawn)\s+/, '');
                    }

                    const newLoadout = [];
                    const tokens = text.split(/\s+/);

                    tokens.forEach((token, index) => {
                        if (!token) return;
                        const pieces = token.split('+');
                        const baseName = pieces[0];

                        const isArmorToken = baseName.toLowerCase().includes('armor') && mode.value === 's';

                        newLoadout.push({
                            id: Date.now() + index,
                            weapon: baseName,
                            attachments: isArmorToken ? [] : pieces.slice(1),
                            expanded: true,
                            isArmor: isArmorToken
                        });
                    });

                    if (discoveredArmor && mode.value === 's') {
                        newLoadout.push({
                            id: Date.now() + 99,
                            weapon: discoveredArmor,
                            attachments: [],
                            expanded: false,
                            isArmor: true
                        });
                    }

                    if (newLoadout.length > 0) {
                        let armorFound = false;
                        const filteredLoadout = newLoadout.filter(item => {
                            if (item.isArmor) {
                                if (armorFound) return false;
                                armorFound = true;
                            }
                            return true;
                        });

                        loadout.value = filteredLoadout;
                        importString.value = '';
                    }
                };

                const compiledCommand = computed(() => {
                    const weaponModules = loadout.value.filter(item => item.weapon.trim() !== '' && !item.isArmor);
                    const armorModule = loadout.value.find(item => item.weapon.trim() !== '' && item.isArmor);

                    if (weaponModules.length === 0 && !armorModule) {
                        return mode.value === 'sts' ? '!sts' : '!s';
                    }

                    if (mode.value === 'sts') {
                        const activeUnits = weaponModules.map(item => {
                            const weapon = cleanInput(item.weapon);
                            const cleanAtts = item.attachments.filter(a => a.trim() !== '').map(a => cleanInput(a));
                            return cleanAtts.length > 0 ? `${weapon}+${cleanAtts.join('+')}` : weapon;
                        });
                        return `!sts ${activeUnits.join(' ')}`;
                    } else {
                        const activeSpawns = weaponModules.map(item => {
                            const weapon = cleanInput(item.weapon);
                            const cleanAtts = item.attachments.filter(a => a.trim() !== '').map(a => cleanInput(a));
                            return cleanAtts.length > 0 ? `!s ${weapon}+${cleanAtts.join('+')}` : `!s ${weapon}`;
                        });

                        if (armorModule) {
                            activeSpawns.push(`!sa ${cleanInput(armorModule.weapon)}`);
                        }

                        return activeSpawns.join(' | ');
                    }
                });

                const copyToClipboard = async () => {
                    try {
                        await navigator.clipboard.writeText(compiledCommand.value);
                        copied.value = true;
                        setTimeout(() => copied.value = false, 1200);
                    } catch (err) {
                        console.error(err);
                    }
                };

                return {
                    mode,
                    loadout,
                    copied,
                    draggedIndex,
                    importString,
                    hasArmor,
                    addItem,
                    addArmorItem,
                    removeItem,
                    addAttachment,
                    removeAttachment,
                    setMode,
                    onDragStart,
                    onDragOver,
                    onDragEnd,
                    onDrop,
                    decompileCommand,
                    compiledCommand,
                    copyToClipboard
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
