<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey!</title>
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --border: #1f1f1f;
            --text: #ffffff;
            --muted: #888;
            --accent: #3b82f6;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--muted);
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s ease;
        }

        .project-card:hover {
            border-color: #444;
            transform: translateY(-2px);
            background: #141414;
        }

        .info { text-align: left; }
        .info h3 { margin: 0; font-size: 1.1rem; }
        .info p { margin: 4px 0 0; font-size: 0.85rem; color: var(--muted); }

        .arrow {
            font-size: 1.2rem;
            color: var(--muted);
            transition: 0.2s;
        }

        .project-card:hover .arrow {
            color: var(--text);
            transform: translateX(4px);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hey there!</h1>
        <p>Check out my projects</p>
    </header>

    <div class="grid">
        <a href="./TextToQR/index.html" class="project-card">
            <div class="info">
                <h3>Text to QR</h3>
                <p>Performant QR code generator</p>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>

    <footer>
        Work In Progress
    </footer>
</div>

</body>
</html>
