<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Text to QR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../qr.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --muted: #a1a1aa;
            --primary: #ffffff;
            --primary-fg: #000000;
            --danger: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; justify-content: center;
            padding: 24px 16px; overflow-y: auto;
        }

        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 20px; }
        header { display: flex; align-items: center; justify-content: space-between; }
        h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }

        .card { background-color: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .qr-stage { min-height: 240px; justify-content: center; position: relative; }
        
        #qrcode-wrap {
            position: relative; padding: 12px; background: #fff; border-radius: var(--radius-md);
            display: none; opacity: 0; transition: all 0.3s ease;
            cursor: pointer; line-height: 0;
        }
        #qrcode-wrap.active { display: block; opacity: 1; }
        
        .qr-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: var(--transition); border-radius: var(--radius-md);
        }
        @media (hover: hover) { #qrcode-wrap:hover .qr-overlay { opacity: 1; } }
        #qrcode-wrap:active .qr-overlay { opacity: 1; }

        .qr-overlay i { color: white; font-size: 1.5rem; }
        .placeholder { color: var(--muted); font-size: 0.85rem; }

        .btn-download {
            margin-top: 20px; background: #27272a; color: var(--text); border: none; 
            padding: 12px 24px; border-radius: var(--radius-sm); font-size: 0.8rem; 
            font-weight: 600; cursor: pointer; display: none; width: 100%;
        }

        .modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.2s ease;
        }
        .modal.open { opacity: 1; pointer-events: all; }
        .modal-content { width: 90%; max-width: 340px; background: #fff; padding: 15px; border-radius: 20px; }
        .modal-content img { width: 100%; height: auto; display: block; image-rendering: pixelated; }

        .btn-close-modal {
            position: absolute; top: 30px; right: 20px; background: #333; color: white; 
            border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem;
        }

        .input-wrapper { position: relative; width: 100%; }
        textarea {
            width: 100%; height: 100px; padding: 16px; background: #202024; color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 16px;
            resize: none; outline: none;
        }
        
        .char-count { position: absolute; bottom: 12px; right: 16px; font-size: 0.7rem; color: var(--muted); }
        .btn-primary {
            width: 100%; padding: 18px; margin-top: 12px; background: var(--primary); color: var(--primary-fg);
            border: none; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 700; cursor: pointer;
        }

        .history-header { display: flex; justify-content: space-between; width: 100%; margin-bottom: 12px; }
        .history-title { font-size: 0.75rem; color: var(--muted); font-weight: 700; }
        .history-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 14px; background: #000; border: 1px solid var(--border); border-radius: var(--radius-sm); 
        }
        .item-text { font-size: 0.8rem; color: #ccc; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-view { background: #27272a; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="qr-modal" class="modal" onclick="this.classList.remove('open')">
    <button class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="modal-img" src="" alt="QR">
    </div>
</div>

<main class="container">
    <header><h1>QR Code Generator</h1></header>

    <section class="card qr-stage">
        <span id="placeholder" class="placeholder">Enter text to generate QR</span>
        <div id="qrcode-wrap" onclick="openModal()">
            <div id="qr-target"></div>
            <div class="qr-overlay"><i class="fa-solid fa-expand"></i></div>
        </div>
        <button class="btn-download" id="btn-download" onclick="downloadImage()">Save QR Image</button>
    </section>

    <section class="card">
        <div class="input-wrapper">
            <textarea id="text-input" maxlength="400" placeholder="Paste link or text..."></textarea>
            <div class="char-count" id="char-count">0 / 400</div>
        </div>
        <button class="btn-primary" onclick="handleGenerate()">GENERATE</button>
    </section>

    <section class="card">
        <div class="history-header">
            <span class="history-title" id="history-title">History</span>
            <button style="background:none; border:none; color:var(--danger); font-size:0.7rem;" onclick="handleClearAll()">Clear All</button>
        </div>
        <div class="history-list" id="history-list"></div>
    </section>
</main>

<script>
    const inputEl = document.getElementById('text-input');
    const qrTarget = document.getElementById('qr-target');
    const qrWrap = document.getElementById('qrcode-wrap');
    const btnDownload = document.getElementById('btn-download');
    const placeholder = document.getElementById('placeholder');
    const historyList = document.getElementById('history-list');
    const modal = document.getElementById('qr-modal');
    const modalImg = document.getElementById('modal-img');
    
    let historyData = JSON.parse(localStorage.getItem('ttqr_data')) || [];

    inputEl.addEventListener('input', () => {
        document.getElementById('char-count').textContent = `${inputEl.value.length} / 400`;
    });

    function handleGenerate() {
        const text = inputEl.value.trim();
        if (!text) return;
        historyData.unshift(text);
        if (historyData.length > 20) historyData.pop();
        inputEl.value = "";
        saveAndRender();
        renderQR(text);
    }

    function renderQR(text) {
        qrTarget.innerHTML = "";
        placeholder.style.display = "none";
        
        // Generate QR
        new QRCode(qrTarget, {
            text: text,
            width: 256,
            height: 256,
            correctLevel: QRCode.CorrectLevel.H
        });
        
        // Wait for the IMG to actually be created by the library
        const checkExist = setInterval(() => {
            const img = qrTarget.querySelector('img');
            if (img && img.src) {
                qrWrap.classList.add('active');
                btnDownload.style.display = "block";
                clearInterval(checkExist);
            }
        }, 100);
    }

    // FIX: Click to Enlarge
    function openModal() {
        const img = qrTarget.querySelector('img');
        if (img && img.src) {
            modalImg.src = img.src;
            modal.classList.add('open');
        }
    }

    // FIX: Force Image Download (Mobile Compatible)
    async function downloadImage() {
        const img = qrTarget.querySelector('img');
        if (!img || !img.src) return;

        try {
            // Convert Base64 to a real Blob so the phone sees it as a FILE
            const response = await fetch(img.src);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `QR_${Date.now()}.png`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Cleanup memory
            window.URL.revokeObjectURL(url);
        } catch (err) {
            // Fallback for very old browsers
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'qrcode.png';
            link.click();
        }
    }

    function handleClearAll() {
        if(confirm("Clear history?")) {
            historyData = [];
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('ttqr_data', JSON.stringify(historyData));
        historyList.innerHTML = historyData.map((item, index) => `
            <div class="history-item">
                <div class="item-text">${item}</div>
                <button class="btn-view" onclick="renderQR('${item.replace(/'/g, "\\'")}')">View</button>
            </div>
        `).join('');
    }

    saveAndRender();
</script>
</body>
</html>
