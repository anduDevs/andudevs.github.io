<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Generate QR Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../qr.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --muted: #a1a1aa;
            --primary: #ffffff;
            --primary-fg: #000000;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
            min-height: 100dvh; padding: 20px 15px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        h1 { font-size: 1.4rem; font-weight: 800; }

        .card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: var(--radius); padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .qr-stage { min-height: 280px; justify-content: center; }
        
        #qrcode-wrap {
            padding: 12px; background: #fff; border-radius: 12px;
            display: none; margin-bottom: 20px;
        }
        #qrcode-wrap.active { display: block; }
        
        #qr-target img, #qr-target canvas { 
            max-width: 100% !important; height: auto !important; 
            display: block; margin: 0 auto;
        }

        .placeholder { color: var(--muted); font-size: 0.8rem; text-align: center; }

        .btn-save {
            display: none; width: 100%; padding: 16px; background: var(--primary); color: var(--primary-fg);
            border: none; border-radius: 12px; font-size: 0.8rem; font-weight: 800; cursor: pointer;
        }
        .btn-save.active { display: block; }

        textarea {
            width: 100%; height: 100px; padding: 15px; background: #202024; color: white;
            border: 1px solid var(--border); border-radius: 12px; font-size: 16px;
            resize: none; outline: none; margin-bottom: 10px; -webkit-appearance: none;
        }
        .btn-gen {
            width: 100%; padding: 18px; background: #27272a; color: white;
            border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 900; cursor: pointer;
        }

        .history-list { width: 100%; display: flex; flex-direction: column; }
        .hist-item { 
            width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 0; border-bottom: 1px solid var(--border);
        }
        .hist-text { font-size: 0.8rem; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 75%; }
        .btn-sm { background: #27272a; border: none; color: white; padding: 8px 15px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>QR Code</h1>

    <div class="card qr-stage">
        <p id="hint" class="placeholder">QR will appear here</p>
        <div id="qrcode-wrap"><div id="qr-target"></div></div>
        <button class="btn-save" id="btn-save" onclick="dl()">SAVE IMAGE</button>
    </div>

    <div class="card">
        <textarea id="input" placeholder="Type or paste here..."></textarea>
        <button class="btn-gen" onclick="gen()">GENERATE</button>
    </div>

    <div class="card" style="align-items: flex-start;">
        <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px; align-items:center;">
            <span style="font-size: 0.7rem; font-weight: 800; color: var(--muted);">RECENT</span>
            <button style="background:none; border:none; color:var(--danger); font-size:0.7rem; font-weight:700; cursor:pointer;" onclick="clearH()">CLEAR</button>
        </div>
        <div id="h-list" class="history-list"></div>
    </div>
</div>

<script>
    const input = document.getElementById('input');
    const target = document.getElementById('qr-target');
    const wrap = document.getElementById('qrcode-wrap');
    const btnSave = document.getElementById('btn-save');
    const hint = document.getElementById('hint');
    const hList = document.getElementById('h-list');

    let history = JSON.parse(localStorage.getItem('andu_cache_v3')) || [];

    function gen() {
        const val = input.value.trim();
        if (!val) return;
        if (history[0] !== val) {
            history.unshift(val);
            if (history.length > 10) history.pop();
            save();
        }
        input.value = "";
        render(val);
    }

    function render(text) {
        target.innerHTML = "";
        hint.style.display = "none";
        wrap.classList.add('active');
        btnSave.classList.add('active');

        new QRCode(target, {
            text: text,
            width: 512,
            height: 512,
            correctLevel: QRCode.CorrectLevel.H
        });
    }

    function dl() {
        const canvas = target.querySelector('canvas');
        if (!canvas) return;

        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `QR_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 'image/png');
    }

    function clearH() {
        if (confirm("Clear history?")) {
            history = [];
            save();
            hint.style.display = "block";
            wrap.classList.remove('active');
            btnSave.classList.remove('active');
        }
    }

    function save() {
        localStorage.setItem('andu_cache_v3', JSON.stringify(history));
        hList.innerHTML = history.map((t) => `
            <div class="hist-item">
                <div class="hist-text">${t}</div>
                <button class="btn-sm" onclick="render('${t.replace(/'/g, "\\'")}')">VIEW</button>
            </div>
        `).join('');
    }

    save();
</script>
</body>
</html>
