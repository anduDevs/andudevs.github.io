<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Text to QR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="qr.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --muted: #a1a1aa;
            --primary: #ffffff;
            --primary-fg: #000000;
            --danger: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; justify-content: center;
            padding: 24px 16px; overflow-y: auto; -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 20px; height: fit-content; }
        header { display: flex; align-items: center; justify-content: space-between; }
        h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }

        .card { background-color: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; }

        /* QR Display */
        .qr-stage { align-items: center; justify-content: center; min-height: 220px; position: relative; }
        
        #qrcode-wrap {
            position: relative; padding: 12px; background: #fff; border-radius: var(--radius-md);
            display: none; opacity: 0; transform: scale(0.95); transition: all 0.3s ease;
            cursor: pointer; overflow: hidden; /* Contains the overlay */
        }
        #qrcode-wrap.active { display: block; opacity: 1; transform: scale(1); }
        
        .qr-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.65);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: var(--transition); border-radius: var(--radius-md);
        }
        #qrcode-wrap:hover .qr-overlay { opacity: 1; }
        .qr-overlay i { color: white; font-size: 2rem; transform: scale(0.8); transition: 0.2s ease; }
        #qrcode-wrap:hover .qr-overlay i { transform: scale(1); }

        .placeholder { color: var(--muted); font-size: 0.85rem; font-weight: 500; }

        .btn-download {
            margin-top: 16px; background: #27272a; color: var(--text); border: none; padding: 10px 20px;
            border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; cursor: pointer; display: none; transition: var(--transition);
        }
        .btn-download:active { transform: scale(0.96); background: #3f3f46; }

        /* Fullscreen modal */
        .modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s ease; padding: 20px;
        }
        .modal.open { opacity: 1; pointer-events: all; }
        
        .modal-content {
            background: #fff; padding: 24px; border-radius: var(--radius-lg);
            width: 100%; max-width: 360px; aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            transform: translateY(20px) scale(0.95); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.open .modal-content { transform: translateY(0) scale(1); }
        
        /* Keeps scaled image sharp*/
        .modal-content img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

        .btn-close-modal {
            position: absolute; top: 20px; right: 20px; background: #27272a; color: white; border: none;
            width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: var(--transition);
        }
        .btn-close-modal:active { background: #3f3f46; transform: scale(0.9); }

        /* Input Area */
        .input-wrapper { position: relative; }
        textarea {
            width: 100%; height: 120px; padding: 16px; background: transparent; color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 16px;
            resize: none; outline: none; transition: var(--transition);
        }
        textarea:focus { border-color: var(--muted); background: #202024; }
        
        .char-count { position: absolute; bottom: 12px; right: 16px; font-size: 0.75rem; font-weight: 600; color: var(--muted); }
        .char-count.limit { color: var(--danger); }

        .btn-primary {
            width: 100%; padding: 18px; margin-top: 12px; background: var(--primary); color: var(--primary-fg);
            border: none; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: var(--transition);
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* History Area */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .history-title { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-text { background: none; border: none; color: var(--danger); font-size: 0.8rem; font-weight: 600; cursor: pointer; padding: 4px; }

        .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding-right: 4px; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #000; border: 1px solid var(--border); border-radius: var(--radius-sm); }
        .item-text { font-size: 0.85rem; color: #d4d4d8; max-width: 55%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .item-actions { display: flex; gap: 8px; }
        .btn-action { border: none; border-radius: 8px; padding: 8px 12px; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn-view { background: #27272a; color: var(--text); }
        .btn-view:active { background: #3f3f46; transform: scale(0.95); }
        .btn-del { background: transparent; color: var(--muted); padding: 8px; }
        .btn-del:active { color: var(--danger); }
    </style>
</head>
<body>

<div id="qr-modal" class="modal" onclick="closeModal(event)">
    <button class="btn-close-modal" onclick="closeModal(event)"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-content">
        <img id="modal-img" src="" alt="Enlarged QR Code">
    </div>
</div>

<main class="container">
    <header>
        <h1>Text to QR</h1>
    </header>

    <section class="card qr-stage">
        <span class="placeholder" id="placeholder">No code generated yet</span>
        
        <div id="qrcode-wrap" onclick="openModal()">
            <div id="qr-target"></div> <div class="qr-overlay">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
        
        <button class="btn-download" id="btn-download" onclick="downloadImage()">Save QR Image</button>
    </section>

    <section class="card">
        <div class="input-wrapper">
            <textarea id="text-input" maxlength="400" placeholder="Type or paste text here..."></textarea>
            <div class="char-count" id="char-count">0 / 400</div>
        </div>
        <button class="btn-primary" onclick="handleGenerate()">GENERATE QR</button>
    </section>

    <section class="card">
        <div class="history-header">
            <span class="history-title" id="history-title">History (0/30)</span>
            <button class="btn-text" onclick="handleClearAll()">Clear All</button>
        </div>
        <div class="history-list" id="history-list"></div>
    </section>
</main>

<script>
    const inputEl = document.getElementById('text-input');
    const countEl = document.getElementById('char-count');
    const qrWrap = document.getElementById('qrcode-wrap');
    const qrTarget = document.getElementById('qr-target');
    const placeholder = document.getElementById('placeholder');
    const btnDownload = document.getElementById('btn-download');
    const historyList = document.getElementById('history-list');
    const historyTitle = document.getElementById('history-title');
    
    // Modal Elements
    const modal = document.getElementById('qr-modal');
    const modalImg = document.getElementById('modal-img');

    const MAX_CHARS = 400;
    const MAX_HISTORY = 30;
    let historyData = JSON.parse(localStorage.getItem('ttqr_pro')) || [];

    // Character Counter
    inputEl.addEventListener('input', () => {
        const len = inputEl.value.length;
        countEl.textContent = `${len} / ${MAX_CHARS}`;
        if (len >= MAX_CHARS - 10) countEl.classList.add('limit');
        else countEl.classList.remove('limit');
    });

    // Generate Logic
    function handleGenerate() {
        const text = inputEl.value.trim();
        if (!text) return;

        historyData.unshift(text);
        if (historyData.length > MAX_HISTORY) historyData.pop();

        inputEl.value = "";
        countEl.textContent = `0 / ${MAX_CHARS}`;
        
        saveAndRender();
        renderQR(historyData[0]);
    }

    function renderQR(text) {
        qrWrap.classList.remove('active');
        qrTarget.innerHTML = "";
        placeholder.style.display = "none";
        btnDownload.style.display = "none";

        setTimeout(() => {
            new QRCode(qrTarget, {
                text: text,
                width: 160,
                height: 160,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
            qrWrap.classList.add('active');
            btnDownload.style.display = "block";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 50);
    }

    // Modal Logic
    function openModal() {
        // Find the image generated qr code
        const img = qrTarget.querySelector('img');
        if (img) {
            modalImg.src = img.src;
            modal.classList.add('open');
        }
    }

    function closeModal(e) {
        if (e.target.classList.contains('modal') || e.target.closest('.btn-close-modal')) {
            modal.classList.remove('open');
        }
    }

    function downloadImage() {
        const img = qrTarget.querySelector('img');
        if (!img) return;
        const link = document.createElement('a');
        link.download = `QR_${Date.now()}.png`;
        link.href = img.src;
        link.click();
    }

    // History Logic
    function handleView(index) { renderQR(historyData[index]); }

    function handleDelete(index) {
        historyData.splice(index, 1);
        resetQRStage();
        saveAndRender();
    }

    function handleClearAll() {
        if (historyData.length === 0) return;
        if (confirm("Are you sure you want to delete all history?")) {
            historyData = [];
            resetQRStage();
            saveAndRender();
        }
    }

    function resetQRStage() {
        qrWrap.classList.remove('active');
        qrTarget.innerHTML = "";
        btnDownload.style.display = "none";
        placeholder.style.display = "block";
    }

    function saveAndRender() {
        localStorage.setItem('ttqr_pro', JSON.stringify(historyData));
        historyTitle.textContent = `History (${historyData.length}/${MAX_HISTORY})`;
        
        historyList.innerHTML = historyData.map((item, index) => `
            <div class="history-item">
                <div class="item-text">${item}</div>
                <div class="item-actions">
                    <button class="btn-action btn-view" onclick="handleView(${index})">View</button>
                    <button class="btn-action btn-del" onclick="handleDelete(${index})">✕</button>
                </div>
            </div>
        `).join('');
    }

    saveAndRender();
</script>

</body>
</html>
