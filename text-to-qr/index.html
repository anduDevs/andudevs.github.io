<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Generate QR Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../qr.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --muted: #a1a1aa;
            --primary: #ffffff;
            --primary-fg: #000000;
            --danger: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; justify-content: center;
            padding: 24px 16px; overflow-y: auto;
        }

        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 20px; }
        header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }

        .card { background-color: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* QR DISPLAY AREA */
        .qr-stage { min-height: 320px; justify-content: center; position: relative; }
        
        #qrcode-wrap {
            padding: 12px; background: #fff; border-radius: var(--radius-md);
            display: none; line-height: 0; margin-bottom: 20px;
        }
        #qrcode-wrap.active { display: block; }
        #qrcode-wrap img { width: 200px; height: 200px; }

        .placeholder { color: var(--muted); font-size: 0.85rem; text-align: center; }

        /* ACTION BUTTONS */
        .actions-row { display: none; width: 100%; gap: 10px; }
        .actions-row.active { display: flex; }

        .btn-action {
            flex: 1; padding: 14px; border-radius: var(--radius-sm); border: none;
            font-size: 0.75rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.2s;
        }
        .btn-save { background: var(--primary); color: var(--primary-fg); }
        .btn-view { background: #27272a; color: white; }
        .btn-action:active { opacity: 0.7; transform: scale(0.98); }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-content { width: 100%; max-width: 340px; background: #fff; padding: 15px; border-radius: 20px; position: relative; }
        .modal-content img { width: 100%; height: auto; display: block; image-rendering: pixelated; }

        .btn-close-modal {
            position: absolute; top: -50px; right: 0; background: none; color: white; 
            border: none; font-size: 2rem; cursor: pointer;
        }

        /* INPUTS */
        .input-wrapper { position: relative; width: 100%; }
        textarea {
            width: 100%; height: 100px; padding: 16px; background: #202024; color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 16px;
            resize: none; outline: none;
        }
        
        .char-count { position: absolute; bottom: 12px; right: 16px; font-size: 0.7rem; color: var(--muted); }
        .btn-generate {
            width: 100%; padding: 18px; margin-top: 12px; background: #27272a; color: white;
            border: none; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 800; cursor: pointer;
        }
        .btn-generate:active { background: #3f3f46; }

        /* HISTORY */
        .history-header { display: flex; justify-content: space-between; width: 100%; margin-bottom: 12px; align-items: center; }
        .history-title { font-size: 0.75rem; color: var(--muted); font-weight: 700; }
        .history-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; background: #000; border: 1px solid var(--border); border-radius: var(--radius-sm); 
        }
        .item-text { font-size: 0.8rem; color: #ccc; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-mini-view { background: #27272a; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; }
    </style>
</head>
<body>

<div id="qr-modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="btn-close-modal" onclick="closeModal()">&times;</button>
        <img id="modal-img" src="" alt="QR">
    </div>
</div>

<main class="container">
    <header><h1>andudevs</h1></header>

    <section class="card qr-stage">
        <span id="placeholder" class="placeholder">QR code will appear here</span>
        
        <div id="qrcode-wrap">
            <div id="qr-target"></div>
        </div>

        <div class="actions-row" id="actions-row">
            <button class="btn-action btn-view" onclick="openModal()">
                <i class="fa-solid fa-expand"></i> VIEW
            </button>
            <button class="btn-action btn-save" onclick="downloadImage()">
                <i class="fa-solid fa-download"></i> SAVE
            </button>
        </div>
    </section>

    <section class="card">
        <div class="input-wrapper">
            <textarea id="text-input" maxlength="400" placeholder="Paste link or text..."></textarea>
            <div class="char-count" id="char-count">0 / 400</div>
        </div>
        <button class="btn-generate" onclick="handleGenerate()">GENERATE</button>
    </section>

    <section class="card">
        <div class="history-header">
            <span class="history-title">History</span>
            <button style="background:none; border:none; color:var(--danger); font-size:0.7rem; font-weight:700;" onclick="handleClearAll()">CLEAR</button>
        </div>
        <div class="history-list" id="history-list"></div>
    </section>
</main>

<script>
    const inputEl = document.getElementById('text-input');
    const qrTarget = document.getElementById('qr-target');
    const qrWrap = document.getElementById('qrcode-wrap');
    const actionsRow = document.getElementById('actions-row');
    const placeholder = document.getElementById('placeholder');
    const historyList = document.getElementById('history-list');
    const modal = document.getElementById('qr-modal');
    
    let historyData = JSON.parse(localStorage.getItem('andu_qr_cache')) || [];

    inputEl.addEventListener('input', () => {
        document.getElementById('char-count').textContent = `${inputEl.value.length} / 400`;
    });

    function handleGenerate() {
        const text = inputEl.value.trim();
        if (!text) return;
        
        if (historyData[0] !== text) {
            historyData.unshift(text);
            if (historyData.length > 15) historyData.pop();
            saveAndRender();
        }
        
        inputEl.value = "";
        document.getElementById('char-count').textContent = "0 / 400";
        renderQR(text);
    }

    function renderQR(text) {
        qrTarget.innerHTML = "";
        placeholder.style.display = "none";
        qrWrap.classList.remove('active');
        actionsRow.classList.remove('active');

        new QRCode(qrTarget, {
            text: text,
            width: 256,
            height: 256,
            correctLevel: QRCode.CorrectLevel.H
        });

        // Ensure the image is rendered before showing buttons
        const checkReady = setInterval(() => {
            const img = qrTarget.querySelector('img');
            if (img && img.src && img.src.length > 100) {
                qrWrap.classList.add('active');
                actionsRow.classList.add('active');
                clearInterval(checkReady);
            }
        }, 100);
    }

    function openModal() {
        const img = qrTarget.querySelector('img');
        if (img && img.src) {
            document.getElementById('modal-img').src = img.src;
            modal.classList.add('open');
        }
    }

    function closeModal() {
        modal.classList.remove('open');
    }

    function downloadImage() {
        const img = qrTarget.querySelector('img');
        if (!img || !img.src) return;

        const link = document.createElement('a');
        link.href = img.src;
        link.download = `QR_${Date.now()}.png`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function handleClearAll() {
        if(confirm("Clear history?")) {
            historyData = [];
            saveAndRender();
            qrTarget.innerHTML = "";
            qrWrap.classList.remove('active');
            actionsRow.classList.remove('active');
            placeholder.style.display = "block";
        }
    }

    function saveAndRender() {
        localStorage.setItem('andu_qr_cache', JSON.stringify(historyData));
        historyList.innerHTML = historyData.map((item, index) => `
            <div class="history-item">
                <div class="item-text">${item}</div>
                <button class="btn-mini-view" onclick="renderQR('${item.replace(/'/g, "\\'")}')">VIEW</button>
            </div>
        `).join('');
    }

    saveAndRender();
</script>
</body>
</html>
