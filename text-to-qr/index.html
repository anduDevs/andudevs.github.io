<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../qr.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --muted: #a1a1aa;
            --primary: #ffffff;
            --primary-fg: #000000;
            --danger: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            min-height: 100dvh; display: flex; justify-content: center;
            padding: 24px 16px; overflow-y: auto;
        }

        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 20px; }
        header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; text-align: left; }

        .card { background-color: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* QR DISPLAY AREA */
        .qr-stage { min-height: 260px; justify-content: center; position: relative; }
        
        #qrcode-wrap {
            position: relative; padding: 12px; background: #fff; border-radius: var(--radius-md);
            display: none; cursor: pointer; line-height: 0; transition: transform 0.2s ease;
        }
        #qrcode-wrap.active { display: block; }
        #qrcode-wrap:active { transform: scale(0.95); }
        
        .qr-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.3);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; border-radius: var(--radius-md); pointer-events: none; transition: 0.2s;
        }
        #qrcode-wrap:active .qr-overlay { opacity: 1; }

        .qr-overlay i { color: white; font-size: 1.5rem; }
        .placeholder { color: var(--muted); font-size: 0.85rem; text-align: center; }

        .btn-download {
            margin-top: 20px; background: #27272a; color: var(--text); border: none; 
            padding: 14px; border-radius: var(--radius-sm); font-size: 0.8rem; 
            font-weight: 700; cursor: pointer; display: none; width: 100%;
        }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.2s;
        }
        .modal.open { display: flex; opacity: 1; }
        .modal-content { width: 85%; max-width: 340px; background: #fff; padding: 12px; border-radius: 20px; }
        .modal-content img { width: 100%; height: auto; display: block; image-rendering: pixelated; }

        .btn-close-modal {
            position: absolute; top: 40px; right: 20px; background: #333; color: white; 
            border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem;
        }

        /* INPUTS */
        .input-wrapper { position: relative; width: 100%; }
        textarea {
            width: 100%; height: 100px; padding: 16px; background: #202024; color: var(--text);
            border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 16px;
            resize: none; outline: none; -webkit-appearance: none;
        }
        
        .char-count { position: absolute; bottom: 12px; right: 16px; font-size: 0.7rem; color: var(--muted); }
        .btn-primary {
            width: 100%; padding: 18px; margin-top: 12px; background: var(--primary); color: var(--primary-fg);
            border: none; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 800; cursor: pointer;
        }

        /* HISTORY */
        .history-header { display: flex; justify-content: space-between; width: 100%; margin-bottom: 12px; align-items: center; }
        .history-title { font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; }
        .history-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; background: #000; border: 1px solid var(--border); border-radius: var(--radius-sm); 
        }
        .item-text { font-size: 0.8rem; color: #ccc; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-view { background: #27272a; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; }
    </style>
</head>
<body>

<div id="qr-modal" class="modal" onclick="closeModal()">
    <button class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="modal-img" src="" alt="QR">
    </div>
</div>

<main class="container">
    <header><h1>andudevs</h1></header>

    <section class="card qr-stage">
        <span id="placeholder" class="placeholder">QR code will appear here</span>
        <div id="qrcode-wrap" onclick="openModal()">
            <div id="qr-target"></div>
            <div class="qr-overlay"><i class="fa-solid fa-expand"></i></div>
        </div>
        <button class="btn-download" id="btn-download" onclick="downloadImage()">SAVE QR IMAGE</button>
    </section>

    <section class="card">
        <div class="input-wrapper">
            <textarea id="text-input" maxlength="400" placeholder="Paste link or text..."></textarea>
            <div class="char-count" id="char-count">0 / 400</div>
        </div>
        <button class="btn-primary" onclick="handleGenerate()">GENERATE</button>
    </section>

    <section class="card">
        <div class="history-header">
            <span class="history-title">Recent History</span>
            <button style="background:none; border:none; color:var(--danger); font-size:0.7rem; font-weight:700; cursor:pointer;" onclick="handleClearAll()">CLEAR</button>
        </div>
        <div class="history-list" id="history-list"></div>
    </section>
</main>

<script>
    const inputEl = document.getElementById('text-input');
    const qrTarget = document.getElementById('qr-target');
    const qrWrap = document.getElementById('qrcode-wrap');
    const btnDownload = document.getElementById('btn-download');
    const placeholder = document.getElementById('placeholder');
    const historyList = document.getElementById('history-list');
    const modal = document.getElementById('qr-modal');
    
    let historyData = JSON.parse(localStorage.getItem('andu_qr_cache')) || [];

    inputEl.addEventListener('input', () => {
        document.getElementById('char-count').textContent = `${inputEl.value.length} / 400`;
    });

    function handleGenerate() {
        const text = inputEl.value.trim();
        if (!text) return;
        
        if (historyData[0] !== text) {
            historyData.unshift(text);
            if (historyData.length > 15) historyData.pop();
            saveAndRender();
        }
        
        inputEl.value = "";
        document.getElementById('char-count').textContent = "0 / 400";
        renderQR(text);
    }

    function renderQR(text) {
        qrTarget.innerHTML = "";
        placeholder.style.display = "none";
        qrWrap.classList.remove('active');
        btnDownload.style.display = "none";

        new QRCode(qrTarget, {
            text: text,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Loop to check when the image tag is ready
        let attempts = 0;
        const checkReady = setInterval(() => {
            const img = qrTarget.querySelector('img');
            attempts++;
            if ((img && img.src && img.src.length > 100) || attempts > 20) {
                qrWrap.classList.add('active');
                btnDownload.style.display = "block";
                clearInterval(checkReady);
            }
        }, 50);
    }

    function openModal() {
        const img = qrTarget.querySelector('img');
        if (img && img.src) {
            document.getElementById('modal-img').src = img.src;
            modal.classList.add('open');
        }
    }

    function closeModal() {
        modal.classList.remove('open');
    }

    async function downloadImage() {
        const img = qrTarget.querySelector('img');
        if (!img || !img.src) return;

        try {
            // Treat it as data, not a webpage
            const blob = await (await fetch(img.src)).blob();
            const blobUrl = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = `QR_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(blobUrl);
        } catch (e) {
            const link = document.createElement('a');
            link.href = img.src;
            link.download = "qrcode.png";
            link.click();
        }
    }

    function handleClearAll() {
        if(confirm("Clear history?")) {
            historyData = [];
            saveAndRender();
            qrTarget.innerHTML = "";
            qrWrap.classList.remove('active');
            btnDownload.style.display = "none";
            placeholder.style.display = "block";
        }
    }

    function saveAndRender() {
        localStorage.setItem('andu_qr_cache', JSON.stringify(historyData));
        historyList.innerHTML = historyData.map((item, index) => `
            <div class="history-item">
                <div class="item-text">${item}</div>
                <button class="btn-view" onclick="renderQR('${item.replace(/'/g, "\\'")}')">VIEW</button>
            </div>
        `).join('');
    }

    // Initial load
    saveAndRender();
</script>

</body>
</html>
